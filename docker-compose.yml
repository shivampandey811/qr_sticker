services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [scan2owner]

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks: [scan2owner]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    networks: [scan2owner]

volumes:
  mongo_data:

networks:
  scan2owner:
